apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "65.8.1"
      helm:
        valueFiles:
          - $values/k8s-gke/platform/prometheus-stack/values.yaml
    - repoURL: https://github.com/NilkanthMiyani/jerney-devops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - kind: Service
      jsonPointers:
        - /metadata/annotations/cloud.google.com~1neg
        - /metadata/annotations/cloud.google.com~1neg-status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required: kube-prometheus-stack CRDs exceed the 262KB annotation limit of client-side apply
