apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-backend
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-backend
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/component: backend
spec:
  # replicas managed by HPA
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}-backend
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # echo "Waiting for {{ .Chart.Name }}-db:5432..."
              # until nc -z {{ .Chart.Name }}-db 5432; do
              #   echo "DB not ready, retrying in 3s..."
              #   sleep 3
              # done
              # echo "DB is ready!"

              echo "Waiting for {{ .Release.Name }}-postgresql:5432..."
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "DB not ready, retrying in 3s..."
                sleep 3
              done
              echo "DB is ready!"
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            # - name: DB_HOST
            #   value: "{{ .Chart.Name }}-db"
            - name: DB_PORT
              value: "5432"
            # - name: DB_USER
            #   valueFrom:
            #     secretKeyRef:
            #       name: {{ .Chart.Name }}-db-secret
            #       key: POSTGRES_USER
            # - name: DB_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: {{ .Chart.Name }}-db-secret
            #       key: POSTGRES_PASSWORD
            # - name: DB_NAME
            #   valueFrom:
            #     secretKeyRef:
            #       name: {{ .Chart.Name }}-db-secret
            #       key: POSTGRES_DB
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: DB_USER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-postgresql"
                  key: password
            - name: DB_NAME
              value: "{{ .Values.postgresql.auth.database }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ .Chart.Name }}-backend"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
