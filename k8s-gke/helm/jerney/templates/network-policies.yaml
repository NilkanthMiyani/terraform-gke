apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-db-allow-backend-only
spec:
  podSelector:
    matchLabels:
      # app.kubernetes.io/name: {{ .Chart.Name }}-db
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}-backend
      ports:
        - port: 5432
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-backend-allow-frontend-and-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-backend
  policyTypes:
    - Ingress
  ingress:
    # Allow from frontend pods (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}-frontend
      ports:
        - port: 5000
          protocol: TCP
    # Allow from GKE Gateway (GCP L7 load balancer via container-native NEG)
    # Traffic comes directly from GCP infrastructure IPs, not from a proxy pod
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16    # GCP load balancer + health checks
        - ipBlock:
            cidr: 130.211.0.0/22   # GCP load balancer proxy
        - ipBlock:
            cidr: 10.0.0.0/24      # node subnet (same-cluster / kubelet traffic)
      ports:
        - port: 5000
          protocol: TCP
