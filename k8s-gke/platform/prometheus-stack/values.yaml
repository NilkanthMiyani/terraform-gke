grafana:
  adminPassword: admin123
  service:
    type: ClusterIP
    annotations: {}
  ingress:
    enabled: false  # routing handled by GKE Gateway HTTPRoute in k8s-gke/platform/gateway/
  sidecar:
    datasources:
      enabled: false  # disable sidecar — loki-stack always creates isDefault:true ConfigMap which conflicts
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
          isDefault: true
          orgId: 1
        - name: Loki
          type: loki
          url: http://loki-stack.monitoring.svc.cluster.local:3100
          isDefault: false
          orgId: 1
          jsonData:
            maxLines: 1000
        - name: Alertmanager
          type: alertmanager
          url: http://prometheus-stack-kube-prom-alertmanager.monitoring.svc.cluster.local:9093
          isDefault: false
          orgId: 1
          jsonData:
            handleGrafanaManagedAlerts: false
            implementation: prometheus

prometheus:
  prometheusSpec:
    podMonitorSelectorNilMatchesAll: true
    serviceMonitorSelectorNilMatchesAll: true
    # Scrape pods with prometheus.io/scrape: "true" annotation.
    # Used by the backend /metrics endpoint.
    additionalScrapeConfigs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
